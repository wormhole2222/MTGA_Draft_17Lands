name: Build & Publish Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write # Required to create the GitHub Release

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Build executable
        run: poetry run pyinstaller main.spec --clean
      - name: Package to ZIP and Checksum
        run: |
          VER_CODE=$(python -c "import re; val = re.search(r'APPLICATION_VERSION\s*=\s*[^0-9]*([0-9.]+)', open('src/constants.py').read()).group(1); print('%04d' % int(round(float(val) * 100)))")
          FILE_NAME="MTGA_Draft_Tool_macOS_${VER_CODE}.zip"
          cd dist
          zip -r "../$FILE_NAME" MTGA_Draft_Tool.app
          cd ..
          shasum -a 256 "$FILE_NAME" | awk '{print $1}' > mac_hash.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: |
            MTGA_Draft_Tool_macOS_*.zip
            mac_hash.txt

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install System Dependencies (Tkinter)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Build executable
        run: poetry run pyinstaller main.spec --clean
      - name: Package to Tarball and Checksum
        run: |
          VER_CODE=$(python -c "import re; val = re.search(r'APPLICATION_VERSION\s*=\s*[^0-9]*([0-9.]+)', open('src/constants.py').read()).group(1); print('%04d' % int(round(float(val) * 100)))")
          FILE_NAME="MTGA_Draft_Tool_Linux_${VER_CODE}.tar.gz"
          cd dist
          tar -czvf "../$FILE_NAME" MTGA_Draft_Tool
          cd ..
          sha256sum "$FILE_NAME" | awk '{print $1}' > linux_hash.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: |
            MTGA_Draft_Tool_Linux_*.tar.gz
            linux_hash.txt

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: python -m pip install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Build executable
        run: poetry run pyinstaller main.spec --clean
      - name: Smoke Test Executable
        run: |
          echo "Launching executable to verify imports..."
          .\dist\MTGA_Draft_Tool.exe --version
      - name: Build installer
        run: iscc ./builder/Installer.iss
      - name: Calculate Hash and Prepare Upload
        run: |
          $exePath = Get-ChildItem -Path "./builder/{app}" -Filter *.exe | Select-Object -First 1
          $hash = (Get-FileHash $exePath.FullName -Algorithm SHA256).Hash.ToLower()
          [IO.File]::WriteAllText("windows_hash.txt", $hash)
          Move-Item $exePath.FullName "./"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: |
            *.exe
            windows_hash.txt

  publish:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true
      - name: Generate Release Body
        id: prep_release
        run: |
          python -c "
          import os, re

          # Parse version to generate Tag Name
          with open('src/constants.py', 'r', encoding='utf-8') as f:
            ver_raw = re.search(r'APPLICATION_VERSION\s*=\s*(.+)', f.read()).group(1).strip().strip(chr(34)).strip(chr(39))
          ver_num = re.match(r'[0-9.]+', ver_raw).group(0)
          tag_name = f'MTGA_Draft_Tool_V{int(round(float(ver_num) * 100)):04d}{ver_raw[len(ver_num):]}'

          # Output tag to GitHub Actions environment
          with open(os.environ.get('GITHUB_OUTPUT', ''), 'a') as f:
              f.write(f'tag_name={tag_name}\n')

          # Extract top chunk of release_notes.txt
          with open('release_notes.txt', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r'(===================== RELEASE NOTES .*? =====================\n.*?)(?=\n===================== RELEASE NOTES|$)', content, re.DOTALL)
          notes = match.group(1).strip() if match else ''

          def get_hash(name):
              p = os.path.join('release_assets', name)
              return open(p).read().strip() if os.path.exists(p) else 'N/A'
              
          win_hash = get_hash('windows_hash.txt')
          mac_hash = get_hash('mac_hash.txt')
          linux_hash = get_hash('linux_hash.txt')

          files = os.listdir('release_assets')
          exe_name = next((f for f in files if f.endswith('.exe')), 'MTGA_Draft_Tool.exe')
          mac_name = next((f for f in files if f.endswith('.zip')), 'MTGA_Draft_Tool_macOS.zip')
          lin_name = next((f for f in files if f.endswith('.tar.gz')), 'MTGA_Draft_Tool_Linux.tar.gz')

          body = f'''{notes}

          ## Security & Verification Hashes

          *Note: These executables and their SHA256 hashes were generated securely via GitHub Actions. To ensure security, verify the hash of the file you download.*

          ### Windows
          **SHA256 Hash:** \`{win_hash}\`

          **Verification Instructions:**
          1. Unzip the downloaded file.
          2. Open the Windows Command Prompt.
          3. Run: \`CertUtil -hashfile {exe_name} SHA256\`

          ### macOS
          **SHA256 Hash:** \`{mac_hash}\`

          **Verification Instructions:**
          1. Open Terminal.
          2. Run: \`shasum -a 256 {mac_name}\`

          *⚠️ macOS Gatekeeper bypass: Because this is an unsigned app, macOS will flag it as \"damaged\" or \"malware\". To fix this, extract the app to your Applications folder, open Terminal, and run \`xattr -cr /Applications/MTGA_Draft_Tool.app\`.*

          ### Linux
          **SHA256 Hash:** \`{linux_hash}\`

          **Verification Instructions:**
          1. Open Terminal.
          2. Run: \`sha256sum {lin_name}\`
          '''
          with open('release_body.md', 'w', encoding='utf-8') as f:
              f.write(body)
          "
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep_release.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release_assets/*.exe
            release_assets/*.zip
            release_assets/*.tar.gz
          body_path: release_body.md
          generate_release_notes: true
          overwrite_files: true
